name: Python Package using Conda

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
        activate-environment: base

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        conda install -c conda-forge flake8 pytest pytest-cov coveralls -y

    - name: Lint with flake8
      shell: bash -l {0}
      run: |
        flake8 data_validator.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 data_validator.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest and coverage
      shell: bash -l {0}
      run: |
        pytest tests/ -v --tb=short --cov=data_validator --cov-report=term --cov-report=xml

    - name: Upload coverage to Coveralls
      shell: bash -l {0}
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      run: |
        coveralls --service=github

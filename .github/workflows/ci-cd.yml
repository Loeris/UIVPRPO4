name: Python Package using Conda

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: ['3.10']   # можно добавить 3.9, 3.11

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Add conda to system path
      run: |
        # $CONDA - переменная окружения, указывающая на корень Miniconda
        echo $CONDA/bin >> $GITHUB_PATH

    - name: Create conda environment
      run: |
        conda env create --file environment.yml
        # Активируем окружение для последующих шагов
        echo "CONDA_ENV_PATH=$(conda info --base)/envs/data-validator-env" >> $GITHUB_ENV

    - name: Install dependencies (additional)
      run: |
        conda activate data-validator-env
        pip install --upgrade pip
        # Если есть requirements.txt, можно установить
        # pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        conda activate data-validator-env
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        conda activate data-validator-env
        pytest tests/ -v --tb=short
